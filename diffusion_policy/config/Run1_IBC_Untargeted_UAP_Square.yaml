defaults:
  - _self_
  - task: square_image

name: train_ibc_dfo_hybrid
_target_: diffusion_policy.workspace.train_ibc_dfo_hybrid_workspace.TrainUnivPertIbcDfoHybridWorkspace
checkpoints:
    train0: '/pre_trained_checkpoints/square_image/IBC_DFO/train_0/checkpoints/epoch=2950-test_mean_score=0.045.ckpt'
algo_name: "IBC"
checkpoint: ${checkpoints.train0}

epsilon: 0.0625
epsilon_step: 0.01
task_name: ${task.name}
shape_meta: ${task.shape_meta}
exp_name: "FinalRun1_UAP-IBC-Lift-pretrained0-seed0"

view: "both"

clip_min: 0
clip_max: 1
targeted: True
perturbations: [0.15, 0.15, 0, 0, 0, 0, 0]
log: True
device: "cuda:0"
save_video: False
n_vis: 4

retrain: False
patch_path: '/pre_trained_checkpoints/square_image/IBC_DFO/train_0/checkpoints/epoch=2950-test_mean_score=0.045.ckpt'

horizon: 2
n_obs_steps: 2
n_action_steps: 1
n_latency_steps: 0
dataset_obs_steps: ${n_obs_steps}
past_action_visible: False
keypoint_visible_rate: 1.0

policy:
  _target_: diffusion_policy.policy.ibc_dfo_hybrid_image_policy.IbcDfoHybridImagePolicy

  shape_meta: ${shape_meta}

  horizon: ${horizon}
  n_action_steps: ${eval:'${n_action_steps}+${n_latency_steps}'}
  n_obs_steps: ${n_obs_steps}
  dropout: 0.1
  train_n_neg: 1024
  pred_n_iter: 5
  pred_n_samples: 1024
  kevin_inference: False
  andy_train: False
  obs_encoder_group_norm: True
  eval_fixed_crop: True
  crop_shape: [76, 76]

dataloader:
  batch_size: 256
  num_workers: 8
  shuffle: True
  pin_memory: True
  persistent_workers: False

val_dataloader:
  batch_size: 128
  num_workers: 8
  shuffle: False
  pin_memory: True
  persistent_workers: False

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-4
  betas: [0.95, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-6

training:
  device: "cuda:0"
  seed: 0
  debug: False
  resume: True
  # optimization
  lr_scheduler: cosine
  lr_warmup_steps: 500
  num_epochs: 50
  gradient_accumulate_every: 1
  # training loop control
  # in epochs
  rollout_every: 10
  checkpoint_every: 25
  val_every: 1
  sample_every: 5
  sample_max_batch: 128
  # steps per epoch
  max_train_steps: null
  max_val_steps: null
  # misc
  tqdm_interval_sec: 1.0

logging:
  project: Final_BC_UAP
  resume: True
  mode: online
  name: ${exp_name}_${epsilon}_${targeted}_${view}_${now:%Y.%m.%d}_${now:%H.%M.%S}
  tags: ["${algo_name}", "${task_name}", "${epsilon}","${exp_name}"]
  id: null
  group: null

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: uap_training_runs/${algo_name}_${task_name}/attack_strength_${epsilon}/${exp_name}_${now:%Y.%m.%d}_${now:%H.%M.%S}
  sweep:
    dir:  uap_training_runs/${algo_name}_${task_name}/attack_strength_${epsilon}/${exp_name}_${now:%Y.%m.%d}_${now:%H.%M.%S}
    subdir: ${hydra.job.num}

