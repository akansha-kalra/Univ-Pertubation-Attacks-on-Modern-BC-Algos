defaults:
  - _self_
  - task: square_image_abs

name: train_diffusion_unet_hybrid
_target_: diffusion_policy.workspace.train_diffusion_unet_hybrid_workspace.TrainRobomimicUniPertImageWorkspaceDP

algo_name: "DP"
checkpoint: '/pre_trained_checkpoints/square_image/diffusion_policy_cnn/train_0/checkpoints/epoch=1250-test_mean_score=1.000.ckpt'

epsilon: 0.125
epsilon_step: 0.01
task_name: ${task.name}
shape_meta: ${task.shape_meta}
exp_name: "FinalRun1-UAP-DP-pretrainedTrain0-seed0"

view: "both"
clip_min: -1
clip_max: 1
targeted: False
pert_dataset: '/data/robomimic/datasets/lift/ph/image_pert.hdf5'
perturbations: [0.45 , 0.45, 0, 0, 0, 0, 0, 0, 0, 0]

log: True
save_video: False
n_vis: 4
patch_path: '/pre_trained_checkpoints/square/diffusion_policy_cnn/train_1/checkpoints/epoch=2050-test_mean_score=0.955.ckpt'

horizon: 16
n_obs_steps: 2
n_action_steps: 8
n_latency_steps: 0
dataset_obs_steps: ${n_obs_steps}
past_action_visible: False
keypoint_visible_rate: 1.0
obs_as_global_cond: True
dataset_path: '/data/robomimic/datasets/square/ph/image_abs.hdf5'

policy:
  _target_: diffusion_policy.policy.diffusion_unet_hybrid_image_policy.DiffusionUnetHybridImagePolicy

  shape_meta: ${shape_meta}

  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddpm.DDPMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    variance_type: fixed_small # Yilun's paper uses fixed_small_log instead, but easy to cause Nan
    clip_sample: True # required when predict_epsilon=False
    prediction_type: epsilon # or sample

  horizon: ${horizon}
  n_action_steps: ${eval:'${n_action_steps}+${n_latency_steps}'}
  n_obs_steps: ${n_obs_steps}
  num_inference_steps: 100
  obs_as_global_cond: ${obs_as_global_cond}
  crop_shape: [76, 76]
  # crop_shape: null
  diffusion_step_embed_dim: 128
  down_dims: [512, 1024, 2048]
  kernel_size: 5
  n_groups: 8
  cond_predict_scale: True
  obs_encoder_group_norm: True
  eval_fixed_crop: True

  # scheduler.step params
  # predict_epsilon: True

ema:
  _target_: diffusion_policy.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

dataloader:
  batch_size: 64
  num_workers: 8
  shuffle: True
  pin_memory: True
  persistent_workers: False

val_dataloader:
  batch_size: 64
  num_workers: 8
  shuffle: False
  pin_memory: True
  persistent_workers: False

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-4
  betas: [0.95, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-6

training:
  device: "cuda:0"
  seed: 0
  debug: False
  resume: True
  # optimization
  lr_scheduler: cosine
  lr_warmup_steps: 500
  num_epochs: 50
  gradient_accumulate_every: 1
  # EMA destroys performance when used with BatchNorm
  # replace BatchNorm with GroupNorm.
  use_ema: True
  # training loop control
  # in epochs
  rollout_every: 10
  checkpoint_every: 25
  val_every: 1
  sample_every: 5
  # steps per epoch
  max_train_steps: null
  max_val_steps: null
  # misc
  tqdm_interval_sec: 1.0


logging:
  project: Final_BC_UAP
  mode: online
  name: ${task_name}_${exp_name}_${epsilon}_${targeted}_${view}_${now:%Y.%m.%d}_${now:%H.%M.%S}
  tags: ["${algo_name}", "${task_name}", "${epsilon}","${exp_name}"]
  id: null
  group: null



hydra:
  job:
    override_dirname: ${name}
  run:
    dir: uap_training_runs/${algo_name}_${task_name}/attack_strength_${epsilon}/${exp_name}_${now:%Y.%m.%d}_${now:%H.%M.%S}
  sweep:
    dir:  uap_training_runs/${algo_name}_${task_name}/attack_strength_${epsilon}/${exp_name}_${now:%Y.%m.%d}_${now:%H.%M.%S}
    subdir: ${hydra.job.num}